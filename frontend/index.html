<!DOCTYPE html>
<html lang="es">

<p>Ambiente DEVELOP 🚀</p>
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>DevOps Incident Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <h1>DevOps Incident Dashboard 🚀</h1>

        <p>
            Gestión de incidentes DevOps
        </p>

    </header>

    <main>

        <!-- =========================
             FORMULARIO
        ========================== -->

        <section class="card">

            <h2>Nuevo Incidente</h2>

            <input
                type="text"
                id="titulo"
                placeholder="Título"
            >

            <textarea
                id="descripcion"
                placeholder="Descripción"
            ></textarea>

            <button onclick="guardarIncidente()">
                Guardar
            </button>

        </section>

        <!-- =========================
             LISTA INCIDENTES
        ========================== -->

        <section class="card">

            <h2>Incidentes</h2>

            <ul id="lista"></ul>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
